name: email-ai-environment
description: AI Email Assistant environment

version: 1.0

entrypoint:
  type: http
  url: http://localhost:7860

endpoints:
  reset:
    path: /reset
    method: POST

  step:
    path: /step
    method: POST

  state:
    path: /state
    method: GET

observation_space:
  type: object
  properties:
    email_text:
      type: string
    sender_type:
      type: string
    urgency:
      type: string
    emotion:
      type: string

action_space:
  type: object
  properties:
    category:
      type: string
    reply:
      type: string

reward:
  type: object
  properties:
    score:
      type: number
    feedback:
      type: string